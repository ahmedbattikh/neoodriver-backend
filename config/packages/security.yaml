security:
    # https://symfony.com/doc/current/security.html#registering-the-user-hashing-passwords
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'
    # https://symfony.com/doc/current/security.html#loading-the-user-the-user-provider
    providers:
        # used to reload user from session & other features (e.g. switch_user)
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email
    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false
        admin:
            pattern: ^/admin
            provider: app_user_provider
            lazy: true
            stateless: false

            form_login:
                login_path: admin_login
                check_path: admin_login
                username_parameter: email
                password_parameter: password
                enable_csrf: true
                default_target_path: /admin

            logout:
                path: /admin/logout
                target: /admin/login
        backoffice:
            pattern: ^/backoffice
            provider: app_user_provider
            lazy: true
            stateless: false

            form_login:
                login_path: backoffice_login
                check_path: backoffice_login
                username_parameter: email
                password_parameter: password
                enable_csrf: true
                default_target_path: /backoffice

            logout:
                path: /backoffice/logout
                target: /backoffice/login
        main:
            lazy: false
            provider: app_user_provider
            stateless: true
            entry_point: jwt

            json_login:
                check_path: /api/login
                login_path: /api/login
                username_path: email
                password_path: password
                success_handler: lexik_jwt_authentication.handler.authentication_success
                failure_handler: lexik_jwt_authentication.handler.authentication_failure

            jwt: ~
            
            refresh_jwt: ~

    # Easy way to control access for large sections of your site
    # Note: Only the *first* access control that matches will be used
    access_control:
        - { path: ^/admin/login, roles: PUBLIC_ACCESS }
        - { path: ^/admin, roles: ROLE_SUPER_ADMIN }
        - { path: ^/backoffice/login, roles: PUBLIC_ACCESS }
        - { path: ^/backoffice, roles: ROLE_SUPER_ADMIN }
        - { path: ^/api/login/email, roles: PUBLIC_ACCESS }
        - { path: ^/api/login/otp, roles: PUBLIC_ACCESS }
        - { path: ^/api/login, roles: PUBLIC_ACCESS }
        - { path: ^/api/register, roles: PUBLIC_ACCESS }
        - { path: ^/token/refresh, roles: PUBLIC_ACCESS }
        - { path: ^/health, roles: PUBLIC_ACCESS }
        # Public API endpoints under /api/open
        - { path: ^/api/open, roles: PUBLIC_ACCESS }
        - { path: ^/api, roles: IS_AUTHENTICATED_FULLY }

when@test:
    security:
        password_hashers:
            # By default, password hashers are resource intensive and take time. This is
            # important to generate secure password hashes. In tests however, secure hashes
            # are not important, waste resources and increase test times. The following
            # reduces the work factor to the lowest possible values.
                cost: 4 # Lowest possible value for bcrypt
                time_cost: 3 # Lowest possible value for argon
                memory_cost: 10 # Lowest possible value for argon
